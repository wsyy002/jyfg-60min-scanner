name: JYFG 60min Scanner

on:
  schedule:
    # 北京时间: 9:31 / 10:31 / 11:31 / 14:01
    # UTC = CST - 8h
    - cron: "31 1,2,3 * * 1-5"   # 9:31 / 10:31 / 11:31
    - cron: "1 6 * * 1-5"        # 14:01
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run 60min scanner
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: python 60min_scanner_ga.py --force
